# Channel identity — edit this file to change niche without touching code.
# Future multi-channel: config/channels/<slug>.yaml + --channel flag

channel:
  name: "İlginç Tarih Shorts"
  niche: "ilginc-tarih"
  niche_label: "İlginç Tarih"
  language: "tr-TR"
  tone: "merak uyandırıcı, güvenilir, hikâye anlatır gibi"
  target_audience: "18-40, Türkiye, tarih ve merak içeriği seven izleyici"

format:
  type: shorts  # shorts | longform
  aspect_ratio: "9:16"
  target_duration_sec: 55
  scene_duration_sec: 5

voice:
  provider: edge-tts
  voice: tr-TR-AhmetNeural  # alternatives: tr-TR-EmelNeural

visuals:
  stock_provider: pexels
  ai_provider: pollinations
  default_visual_type: mixed  # stock | ai | mixed

production:
  reviewer_min_score: 7.0
  reviewer_max_retries: 2
  altered_content_default: false
